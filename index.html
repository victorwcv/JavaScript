<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPG - Dragon Repeller</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="game">
      <div id="stats">
        <span class="stat"
          >XP: <strong><span id="xpText">0</span></strong></span
        >
        <span class="stat"
          >VIDA: <strong><span id="healthText">100</span></strong></span
        >
        <span class="stat"
          >ORO: <strong><span id="goldText">50</span></strong></span
        >
      </div>
      <div id="controls">
        <button id="button1">Ir a la tienda</button>
        <button id="button2">Ir a la caverna</button>
        <button id="button3">Luchar contra el dragon</button>
      </div>
      <div id="monsterStats">
        <span class="stat"
          >Nombre de monstruo: <strong><span id="monsterName"></span></strong> </span
        ><span class="stat"
          >vida: <strong><span id="monsterHealth"></span></strong
        ></span>
      </div>
      <div id="text">
        Bienvenido a Dragon Repeller. Debes derrotar al dragón que está impidiendo que la gente salga del pueblo. Te encuentras en la plaza del pueblo. ¿A dónde quieres ir? Utiliza los botones de arriba.
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
